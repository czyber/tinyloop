<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="tinyloop-gradient" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#0268cf" />
      <stop offset="0.5" stop-color="#141414" stop-opacity="0.48" />
      <stop offset="1" stop-color="#e0770d" />
    </linearGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#141414" stroke-opacity="0.045" stroke-width="1" />
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#141414" flood-opacity="0.1" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f3f3f1" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <g transform="translate(72 72)">
    <g transform="translate(0 0)">
      <path
        d="M4 16c0-5.6 5.7-5.9 9.6 0s9.6 5.6 9.6 0-5.7-5.9-9.6 0-9.6 5.6-9.6 0Z"
        fill="none"
        stroke="url(#tinyloop-gradient)"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2.7"
        transform="scale(1.7)"
      />
      <text
        x="60"
        y="31"
        fill="#141414"
        font-family="Georgia, Times New Roman, serif"
        font-size="35"
        font-weight="400"
      >tinyloop</text>
      <text
        x="211"
        y="30"
        fill="#747675"
        font-family="Menlo, Consolas, monospace"
        font-size="15"
        font-weight="700"
      >v0.1.0</text>
    </g>

    <text
      x="0"
      y="178"
      fill="#141414"
      font-family="Georgia, Times New Roman, serif"
      font-size="132"
      font-weight="400"
    >tinyloop</text>
    <text
      x="4"
      y="239"
      fill="#747675"
      font-family="Menlo, Consolas, monospace"
      font-size="25"
      font-weight="600"
    >A small, readable agent loop</text>
    <text
      x="4"
      y="281"
      fill="#747675"
      font-family="Menlo, Consolas, monospace"
      font-size="25"
      font-weight="600"
    >for studying model turns, tool calls,</text>
    <text
      x="4"
      y="323"
      fill="#747675"
      font-family="Menlo, Consolas, monospace"
      font-size="25"
      font-weight="600"
    >session events, and UI state.</text>

    <g transform="translate(4 390)" filter="url(#soft-shadow)">
      <rect width="414" height="72" rx="8" fill="#fbfbfa" stroke="#d8d9d7" />
      <text
        x="26"
        y="46"
        fill="#141414"
        font-family="Menlo, Consolas, monospace"
        font-size="22"
        font-weight="700"
      >npm install -g tinyloop</text>
    </g>
  </g>

  <g transform="translate(666 180)">
    <path
      d="M0 172c0-99 101-104 169 0s169 99 169 0S237 68 169 172 0 271 0 172Z"
      fill="none"
      stroke="url(#tinyloop-gradient)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="5"
    />
  </g>
</svg>
